<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="app">
      <section class="hero card">
        <p class="eyebrow">Focus Stack</p>
        <h1>Pomodoro Pulse</h1>
        <p class="subtitle">Cut distractions, ship work in focused bursts.</p>
      </section>

      <section class="timer card">
        <div class="mode-switch" role="tablist" aria-label="Timer mode">
          <button class="mode active" data-mode="focus">Focus</button>
          <button class="mode" data-mode="shortBreak">Short Break</button>
          <button class="mode" data-mode="longBreak">Long Break</button>
        </div>

        <div class="dial-wrap">
          <div class="dial" id="dial" aria-live="polite">
            <span id="timeLabel">25:00</span>
          </div>
        </div>

        <div class="actions">
          <button id="startPause">Start</button>
          <button id="reset" class="ghost">Reset</button>
          <button id="skip" class="ghost">Skip</button>
        </div>

        <div class="settings-grid">
          <label>
            Focus (min)
            <input id="focusInput" type="number" min="1" max="90" value="25" />
          </label>
          <label>
            Short break
            <input id="shortBreakInput" type="number" min="1" max="30" value="5" />
          </label>
          <label>
            Long break
            <input id="longBreakInput" type="number" min="1" max="60" value="15" />
          </label>
        </div>
      </section>

      <section class="tasks card">
        <h2>Task lane</h2>
        <form id="taskForm" autocomplete="off">
          <input id="taskInput" type="text" placeholder="Add a task..." maxlength="80" />
          <button type="submit">Add</button>
        </form>
        <ul id="taskList"></ul>
      </section>

      <section class="stats card">
        <h2>Today</h2>
        <p><strong id="doneCount">0</strong> pomodoros done</p>
        <p><strong id="focusMinutes">0</strong> focus minutes</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
